<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FormToDoc — Clean Form Extraction</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="shortcut icon" href="/favicon.svg">
    <script src="/config.js"></script>
    <style>
        :root {
            --bg: #fdfcfb;
            --card: #ffffff;
            --text: #1a1a1a;
            --text-secondary: #6b6b6b;
            --accent: #000000;
            --border: #e5e5e3;
            --input-bg: #f7f7f5;
            --success: #2e7d32;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 4rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 680px;
        }

        header {
            margin-bottom: 3rem;
            text-align: left;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin: 0 0 0.5rem 0;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .nav-tabs {
            display: flex;
            gap: 2rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }

        .tab {
            padding: 0.75rem 0;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-secondary);
            position: relative;
            transition: color 0.2s;
        }

        .tab.active {
            color: var(--text);
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--accent);
        }

        .panel {
            display: none;
            width: 100%;
        }

        .panel.active { display: block; }

        textarea, input[type="url"] {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            font-family: inherit;
            font-size: 0.95rem;
            margin-bottom: 1rem;
            transition: border-color 0.2s;
            outline: none;
        }

        textarea:focus, input[type="url"]:focus {
            border-color: #bcbcb8;
        }

        textarea { height: 240px; resize: none; }

        .btn-group {
            display: flex;
            gap: 0.75rem;
        }

        button {
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--accent);
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover { opacity: 0.85; }

        .btn-secondary {
            background: transparent;
            color: var(--text);
            border-color: var(--border);
        }

        .btn-secondary:hover { background: #f0f0ee; }

        #loading {
            display: none;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin: 2rem 0;
            font-style: italic;
        }

        #results {
            margin-top: 4rem;
            width: 100%;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .question-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .question-item {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
        }

        .question-text {
            flex: 1;
            font-size: 0.95rem;
            outline: none;
        }

        .remove-btn {
            color: #ff4444;
            font-size: 0.75rem;
            cursor: pointer;
            opacity: 0.5;
            background: none;
            border: none;
            padding: 0;
        }

        .remove-btn:hover { opacity: 1; }

        .export-actions {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card);
            padding: 1rem 1.5rem;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 1px solid var(--border);
            display: flex;
            gap: 1rem;
            z-index: 100;
        }

        .export-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 20px;
            font-weight: 500;
        }

        .hidden { display: none !important; }
        #rendered-output { position: absolute; left: -9999px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem;">
                <div style="width: 40px; height: 40px; background: white; border: 2px solid black; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.8rem; letter-spacing: -0.5px;">FTD</div>
                <h1 style="margin: 0;">FormToDoc</h1>
            </div>
            <p class="subtitle">Transform messy form fragments into clean documents.</p>
        </header>

        <div class="nav-tabs">
            <div class="tab active" onclick="switchTab('paste-panel', this)">Paste Selection</div>
            <div class="tab" onclick="switchTab('url-panel', this)">Add Form URL</div>
        </div>

        <div id="paste-panel" class="panel active">
            <input type="url" id="paste-url-input" placeholder="Optional form URL to place at the top of the doc">
            <textarea id="paste-input" placeholder="Copy form selection (Cmd+A) and paste here..."></textarea>
            <div class="btn-group">
                <button class="btn-primary" id="extract-btn" onclick="extractPasted()">Extract Questions</button>
                <button class="btn-secondary" onclick="clearAll()">Clear</button>
            </div>
        </div>

        <div id="url-panel" class="panel">
            <input type="url" id="url-input" placeholder="https://application-site.com/apply">
            <div class="btn-group">
                <button class="btn-primary" id="scrape-btn" onclick="scrapeUrl()">Create Doc with URL</button>
                <button class="btn-secondary" onclick="clearAll()">Clear</button>
            </div>
        </div>

        <div id="loading">Processing with intelligence...</div>

        <div id="results" class="hidden">
            <div class="results-header">
                <h2 style="font-size: 1.1rem; font-weight: 600;">Draft Template</h2>
                <span id="count-tag" style="font-size: 0.8rem; color: var(--text-secondary);"></span>
            </div>
            
            <div id="questions-list" class="question-list"></div>
        </div>
    </div>

    <div id="export-bar" class="export-actions hidden">
        <button class="export-btn" onclick="copyForDocs()">Copy for Google Docs</button>
        <button class="btn-secondary" style="border-radius: 20px;" onclick="downloadHtml()">HTML</button>
        <button class="btn-secondary" style="border-radius: 20px;" onclick="downloadMarkdown()">Markdown</button>
    </div>

    <div id="rendered-output"></div>

    <script>
        let questions = [];
        let latestTemplate = '';
        let sourceUrl = '';
        let analyticsReady = false;

        function trackEvent(eventName, params = {}) {
            if (window.gtag) {
                window.gtag('event', eventName, params);
            }

            if (window.clarity) {
                window.clarity('event', eventName);
            }
        }

        function initAnalytics() {
            if (analyticsReady) return;
            analyticsReady = true;

            const config = window.__APP_CONFIG__ || {};

            if (config.gaMeasurementId) {
                const gaScript = document.createElement('script');
                gaScript.async = true;
                gaScript.src = `https://www.googletagmanager.com/gtag/js?id=${encodeURIComponent(config.gaMeasurementId)}`;
                document.head.appendChild(gaScript);

                window.dataLayer = window.dataLayer || [];
                window.gtag = function gtag() { window.dataLayer.push(arguments); };
                window.gtag('js', new Date());
                window.gtag('config', config.gaMeasurementId);
            }

            if (config.clarityProjectId) {
                (function(c, l, a, r, i, t, y) {
                    c[a] = c[a] || function() { (c[a].q = c[a].q || []).push(arguments); };
                    t = l.createElement(r);
                    t.async = 1;
                    t.src = `https://www.clarity.ms/tag/${i}`;
                    y = l.getElementsByTagName(r)[0];
                    y.parentNode.insertBefore(t, y);
                })(window, document, 'clarity', 'script', config.clarityProjectId);
            }
        }

        initAnalytics();

        function clearAll() {
            questions = [];
            latestTemplate = '';
            sourceUrl = '';
            document.getElementById('url-input').value = '';
            document.getElementById('paste-url-input').value = '';
            document.getElementById('paste-input').value = '';
            document.getElementById('results').classList.add('hidden');
            document.getElementById('export-bar').classList.add('hidden');
            document.getElementById('questions-list').innerHTML = '';
        }

        function switchTab(panelId, tabElement) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(panelId).classList.add('active');
            tabElement.classList.add('active');
            clearAll();
        }

        function renderQuestions() {
            const list = document.getElementById('questions-list');
            list.innerHTML = '';
            latestTemplate = buildPlainTextTemplate();
            
            if (questions.length === 0 && !sourceUrl) {
                list.innerHTML = '<div style="padding: 3rem; text-align: center; color: var(--text-secondary); font-size: 0.9rem;">No questions found. Try a broader selection.</div>';
                document.getElementById('export-bar').classList.add('hidden');
            } else {
                document.getElementById('export-bar').classList.remove('hidden');
            }

            if (sourceUrl) {
                const item = document.createElement('div');
                item.className = 'question-item';

                const text = document.createElement('div');
                text.className = 'question-text';
                text.innerHTML = `<strong>Form URL:</strong> <a href="${escapeAttribute(sourceUrl)}" target="_blank" rel="noopener noreferrer">${escapeHtml(sourceUrl)}</a>`;

                item.appendChild(text);
                list.appendChild(item);
            }

            questions.forEach((q, index) => {
                const item = document.createElement('div');
                item.className = 'question-item';
                
                const text = document.createElement('div');
                text.className = 'question-text';
                text.contentEditable = true;
                text.innerText = q;
                text.onblur = (e) => { questions[index] = e.target.innerText; };
                
                const delBtn = document.createElement('button');
                delBtn.className = 'remove-btn';
                delBtn.innerText = 'Remove';
                delBtn.onclick = () => {
                    questions.splice(index, 1);
                    renderQuestions();
                };

                item.appendChild(text);
                item.appendChild(delBtn);
                list.appendChild(item);
            });
            
            const extraLabel = sourceUrl ? ' + form link' : '';
            document.getElementById('count-tag').innerText = `${questions.length} questions detected${extraLabel}`;
            document.getElementById('results').classList.remove('hidden');
        }

        async function scrapeUrl() {
            const url = document.getElementById('url-input').value;
            if (!url) return;
            sourceUrl = url.trim();
            questions = [];
            latestTemplate = buildPlainTextTemplate();
            renderQuestions();
            trackEvent('create_doc_with_url', { has_url: true });
        }

        async function extractPasted() {
            const text = document.getElementById('paste-input').value;
            if (!text) return;
            sourceUrl = document.getElementById('paste-url-input').value.trim();

            const loading = document.getElementById('loading');
            loading.style.display = 'block';
            document.getElementById('results').classList.add('hidden');

            try {
                const response = await fetch('/api/clean', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                const data = await response.json();
                questions = Array.isArray(data.questions) ? data.questions : [];
                latestTemplate = data.template || buildPlainTextTemplate();
                renderQuestions();
                trackEvent('extract_questions', {
                    has_url: Boolean(sourceUrl),
                    question_count: questions.length,
                });
            } catch (error) {
                alert('AI processing failed.');
            } finally {
                loading.style.display = 'none';
            }
        }

        function generateHtmlContent() {
            let html = '<div style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; color: #1a1a1a;">';
            if (sourceUrl) {
                html += `<p style="margin-bottom: 20pt; font-size: 11pt;"><strong>Form URL:</strong> <a href="${escapeAttribute(sourceUrl)}">${escapeHtml(sourceUrl)}</a></p>`;
            }
            questions.forEach(q => {
                html += `<h2 style="font-size: 14pt; margin-top: 24pt; margin-bottom: 6pt;"><strong>${escapeHtml(q)}</strong></h2>`;
                html += `<p style="color: #666666; margin-bottom: 24pt;">[Your answer here]</p>`; 
            });
            html += '</div>';
            return html;
        }

        function buildPlainTextTemplate() {
            const sections = [];
            if (sourceUrl) {
                sections.push(`Form URL\n${sourceUrl}`);
            }
            questions.forEach(q => sections.push(`${q}\n[Your answer here]`));
            return sections.join('\n\n');
        }

        function escapeHtml(unsafe) {
            return unsafe.replace(/[&<"']/g, m => ({'&':'&amp;','<':'&lt;','"':'&quot;',"'":"&#039;"}[m]));
        }

        function escapeAttribute(unsafe) {
            return unsafe.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#039;"}[m]));
        }

        function copyForDocs() {
            const html = generateHtmlContent();
            const container = document.getElementById('rendered-output');
            container.innerHTML = html;

            const blobHtml = new Blob([html], { type: 'text/html' });
            const blobText = new Blob([latestTemplate || buildPlainTextTemplate()], { type: 'text/plain' });
            
            const data = [new ClipboardItem({ 'text/html': blobHtml, 'text/plain': blobText })];
            
            navigator.clipboard.write(data).then(() => {
                trackEvent('copy_for_google_docs', {
                    has_url: Boolean(sourceUrl),
                    question_count: questions.length,
                });
                const btn = document.querySelector('.export-btn');
                const original = btn.innerText;
                btn.innerText = 'Copied!';
                btn.style.background = '#2e7d32';
                setTimeout(() => {
                    btn.innerText = original;
                    btn.style.background = '';
                }, 2000);
            });
        }

        function downloadHtml() {
            const content = `<!DOCTYPE html><html><head><meta charset="utf-8"></head><body>${generateHtmlContent()}</body></html>`;
            downloadFile(content, 'text/html', 'form_template.html');
        }

        function downloadMarkdown() {
            let md = '';
            if (sourceUrl) {
                md += `### Form URL\n\n${sourceUrl}\n\n---\n\n`;
            }
            questions.forEach(q => md += `### ${q}\n\n[Your answer here]\n\n---\n\n`);
            downloadFile(md, 'text/markdown', 'form_template.md');
        }

        function downloadFile(content, mime, filename) {
            const blob = new Blob([content], { type: mime });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = filename;
            a.click();
        }
    </script>
</body>
</html>
